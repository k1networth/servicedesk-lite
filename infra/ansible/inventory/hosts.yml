---
# Inventory template for a self-managed Kubernetes cluster.
# Replace IP addresses and connection settings with your actual values.
# Used as an alternative to Managed K8s (Yandex Cloud) for on-premise deployments.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml site.yml

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_become: true

  children:
    # Single control-plane node (for diploma demo, multi-master not required)
    control_plane:
      hosts:
        cp-01:
          ansible_host: 10.10.1.10

    # Worker nodes
    workers:
      hosts:
        worker-01:
          ansible_host: 10.10.1.11
        worker-02:
          ansible_host: 10.10.1.12

    # Group used by kubeadm join tasks (all except control-plane)
    k8s_nodes:
      children:
        control_plane:
        workers:
