---
# Role: base
# Prepares the OS for running Kubernetes:
#   - disables swap (required by kubelet)
#   - loads required kernel modules
#   - configures sysctl networking parameters
#   - sets system-wide ulimits for containers

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false

- name: Remove swap from /etc/fstab (persist across reboots)
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ k8s_kernel_modules }}"

- name: Persist kernel modules across reboots
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      {% for module in k8s_kernel_modules %}
      {{ module }}
      {% endfor %}
    mode: "0644"

- name: Apply sysctl parameters for Kubernetes networking
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop: "{{ k8s_sysctl_params | dict2items }}"

- name: Set system-wide ulimits for containers
  blockinfile:
    path: /etc/security/limits.d/k8s.conf
    create: true
    block: |
      * soft nofile 1048576
      * hard nofile 1048576
      * soft nproc  unlimited
      * hard nproc  unlimited
    mode: "0644"

- name: Install prerequisite packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
