---
# Role: container-runtime
# Installs containerd, runc, and CNI plugins — required by kubelet.
#
# Versions are controlled via group_vars/all.yml:
#   containerd_version, runc_version, cni_plugins_version

- name: Create /etc/containerd directory
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Create CNI plugins directory
  file:
    path: /opt/cni/bin
    state: directory
    mode: "0755"

# ── containerd ────────────────────────────────────────────────────────────────

- name: Download containerd archive
  get_url:
    url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-amd64.tar.gz"
    dest: "/tmp/containerd-{{ containerd_version }}.tar.gz"
    mode: "0644"
  register: containerd_download

- name: Extract containerd binaries to /usr/local
  unarchive:
    src: "/tmp/containerd-{{ containerd_version }}.tar.gz"
    dest: /usr/local
    remote_src: true
  when: containerd_download.changed

- name: Download containerd systemd service file
  get_url:
    url: "https://raw.githubusercontent.com/containerd/containerd/main/containerd.service"
    dest: /etc/systemd/system/containerd.service
    mode: "0644"
  notify: Reload systemd

- name: Generate default containerd config
  command: containerd config default
  register: containerd_default_config
  changed_when: false

- name: Write containerd config with SystemdCgroup enabled
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_default_config.stdout | replace('SystemdCgroup = false', 'SystemdCgroup = true') }}"
    mode: "0644"
  notify: Restart containerd

- name: Enable and start containerd
  systemd:
    name: containerd
    enabled: true
    state: started
    daemon_reload: true

# ── runc ──────────────────────────────────────────────────────────────────────

- name: Download runc binary
  get_url:
    url: "https://github.com/opencontainers/runc/releases/download/v{{ runc_version }}/runc.amd64"
    dest: /usr/local/sbin/runc
    mode: "0755"

# ── CNI plugins ───────────────────────────────────────────────────────────────

- name: Download CNI plugins archive
  get_url:
    url: "https://github.com/containernetworking/plugins/releases/download/v{{ cni_plugins_version }}/cni-plugins-linux-amd64-v{{ cni_plugins_version }}.tgz"
    dest: "/tmp/cni-plugins-{{ cni_plugins_version }}.tgz"
    mode: "0644"
  register: cni_download

- name: Extract CNI plugins
  unarchive:
    src: "/tmp/cni-plugins-{{ cni_plugins_version }}.tgz"
    dest: /opt/cni/bin
    remote_src: true
  when: cni_download.changed
