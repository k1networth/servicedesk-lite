nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: servicedesk

app:
  env: dev

images:
  ticketService:
    repository: servicedesk/ticket-service
    tag: dev
    pullPolicy: IfNotPresent
  outboxRelay:
    repository: servicedesk/outbox-relay
    tag: dev
    pullPolicy: IfNotPresent
  notificationService:
    repository: servicedesk/notification-service
    tag: dev
    pullPolicy: IfNotPresent
  migrate:
    repository: servicedesk/migrate
    tag: dev
    pullPolicy: IfNotPresent

postgres:
  image: postgres:16-alpine
  database: servicedesk
  user: servicedesk
  # For demo only. Override in values-kind.yaml or via --set.
  password: servicedesk
  storage:
    size: 1Gi
  # Connection pool size per service instance.
  maxOpenConns: 25
  maxIdleConns: 25
  # Postgres server tuning (passed as -c flags).
  maxConnections: 200
  sharedBuffers: 256MB
  # synchronous_commit=off: skip WAL flush wait on each commit.
  # Safe for demo/diploma load tests; do NOT use in production without replication.
  synchronousCommit: "off"

kafka:
  image: apache/kafka:3.7.0
  topic: tickets.events
  # Optional DLQ topic name (empty = disabled)
  dlqTopic: ""

resources:
  ticketService:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 1000m
      memory: 256Mi
  outboxRelay:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  notificationService:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

service:
  ticketService:
    port: 8080
  outboxRelay:
    port: 9090
  notificationService:
    port: 9091

ingress:
  enabled: true
  className: nginx
  # For kind you can leave host empty and use path routing via localhost (see infra/k8s/kind/kind-config.yaml)
  host: ""
  path: /

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
